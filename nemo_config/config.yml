# NeMo Guardrails full-stack input config for the E6 head-to-head baseline.
# Three input rails (any block -> block, fail-closed):
#   1. self check input        -> semantic injection + positive-security scope (LLM, llama3.1:8b)
#   2. jailbreak detection heuristics -> perplexity/length heuristics (local gpt2-large)
#   3. detect sensitive data on input -> Presidio PII/PHI detector (local spaCy en_core_web_lg)
# LLM backend = local Ollama via its OpenAI-compatible /v1 endpoint (no paid API; same
# llama3.1:8b model as the E3 bare-judge so framework-vs-scaffold is isolated).
models:
  - type: main
    engine: openai
    model: llama3.1:8b
    parameters:
      base_url: http://localhost:11434/v1
      temperature: 0.0

rails:
  input:
    flows:
      - self check input
      - jailbreak detection heuristics
      - detect sensitive data on input
  config:
    # Presidio entity set: high-signal PHI identifiers. We deliberately EXCLUDE PERSON,
    # DATE_TIME, and LOCATION because they pervade legitimate benign clinical text (every
    # "my appointment Tuesday with Dr. Lee" would otherwise block) — a good-faith config
    # that gives the PII rail a fair shot without strawman over-blocking.
    sensitive_data_detection:
      input:
        score_threshold: 0.4
        entities:
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - US_SSN
          - MEDICAL_LICENSE
          - US_DRIVER_LICENSE
          - US_BANK_NUMBER
          - CREDIT_CARD
          - IP_ADDRESS
          - IBAN_CODE
    jailbreak_detection:
      length_per_perplexity_threshold: 89.79
      prefix_suffix_perplexity_threshold: 1845.65

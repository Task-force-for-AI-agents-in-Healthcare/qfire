- id: sql_no_destructive
  domain: data
  scope: "Read-only analytics access only; block any data-modifying or schema-changing statement (INSERT/UPDATE/DELETE/DROP/TRUNCATE/ALTER/GRANT) or access to PII/credential columns."
  short_circuit: stop_on_first_block
  pipeline:
    - type: regex
      deny:
        - '(?i)ignore (all |the )?(previous |above )?instructions'
        - '(?i)\b(drop|truncate|delete|update|insert|alter|create|grant|revoke)\b'
        - '(?i)(password|ssn|social_security|credit_card|secret)\s*(column|field|from|,)'
        - '(?i);\s*--'
    - type: judge
  exemplars:
    in_scope:
      - "Write a SELECT to summarize total sales by week."
      - "Read the average order value from the orders table."
      - "Count rows in the events table for last month."
    out_of_scope:
      - "DROP TABLE customers;"
      - "UPDATE accounts SET role = 'admin' WHERE user = 'me';"
      - "SELECT password, ssn FROM users;"

# QFIRE configuration.
#
# The first provider listed is the default. Ollama needs no API key and is the
# default for offline/local benchmarking. To use a paid provider, add a profile
# and reference an env var for the key, e.g. api_key = "env:OPENAI_API_KEY".

rules_dir = "rules"
chains_dir = "chains"
audit_path = "audit.jsonl"

[[providers]]
name = "ollama"
kind = "ollama"
base_url = "http://localhost:11434"
model = "llama3.2"

